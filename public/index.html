<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflective Agent Blueprint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Reflective Agent Blueprint</h1>
            <p>Self-Critique & Iteration - Module 3.2</p>
        </header>
        
        <main>
            <div id="chat-container">
                <div id="chat-messages" class="chat-messages"></div>
                <div id="chat-input-container">
                    <input type="text" id="user-input" placeholder="Ask something... (e.g., 'Explain how AI works')" autocomplete="off">
                    <button id="send-button">Send</button>
                </div>
            </div>
            
            <div id="iteration-panel" class="iteration-panel">
                <h3>Self-Reflection Process</h3>
                <div id="iterations-list"></div>
            </div>
        </main>
        
        <footer>
            <p>Deployed via Netlify using your affiliate link</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
